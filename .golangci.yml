version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - revive
    - gosec
    - misspell
    - ineffassign
  settings:
    errcheck:
      exclude-functions:
        # stderr/summary writers; failures here are unactionable
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (*text/tabwriter.Writer).Flush
    gosec:
      excludes:
        - G104 # duplicate of errcheck
        - G304 # reading user-supplied config/fixture paths is the CLI's job
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
