name: release

on:
  push:
    tags: ["v[0-9]*"]

permissions:
  contents: write # publish releases + move the floating major tag
  id-token: write # cosign keyless signing via GitHub OIDC

jobs:
  # Release blocks on a green race-enabled suite — never ship a red build.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
      - run: go test ./... -race

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # goreleaser needs full history for the changelog
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
      - uses: sigstore/cosign-installer@v3
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Only used for the Homebrew tap push on stable releases; absent is
          # fine for prereleases (brews.skip_upload: auto).
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      - name: move floating major tag and pin VERSION
        run: bash scripts/move_major_tag.sh "${GITHUB_REF_NAME}"
