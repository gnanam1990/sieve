name: ci

on:
  push:
    branches: [main, "stage-*"]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.23.x"
      - uses: golangci/golangci-lint-action@v9

  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.23.x"
      - run: go test ./... -race -shuffle=on

  cover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.23.x"
      - name: coverage thresholds
        run: make cover

  # Lint the release/action plumbing: workflow YAML, action.yml, and shell.
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: actionlint
        uses: raven-actions/actionlint@v2

  action-smoke:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Create fake smoke config
        shell: bash
        run: |
          printf '%s\n' '{"findings":[]}' > .sieve.fake.json
          cat > .sieve.fake.yml <<'EOF'
          provider:
            type: fake
            fixture: .sieve.fake.json
          EOF
      - uses: ./
        with:
          provider: fake
          post: false
          config_path: .sieve.fake.yml
          repo: gnanam1990/sieve
          pr: "1"

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: shellcheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck install.sh scripts/*.sh
