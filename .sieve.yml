# sieve configuration — every key is optional; these are the defaults.
# Unknown keys are a hard error (typo protection).
#
# SECURITY: there is no api_key field, on purpose. Keys are read from the
# environment variable NAMED by api_key_env and can never live in this file.

paths:
  exclude: []
  # exclude:
  #   - "docs/**"
  #   - "**/*.gen.go"

review:
  # Noise gate (stage 3). A finding below min_confidence is dropped. A
  # finding reaches the *inline* tier only when its severity is at least
  # inline_min_severity AND its confidence is at least inline_min_confidence;
  # everything else surviving the floor goes to the walkthrough notes tier.
  # Inline overflow past max_inline_comments is demoted to notes, never lost.
  min_confidence: 0.6         # drop floor (0.0-1.0)
  inline_min_confidence: 0.8  # inline tier confidence gate (>= min_confidence)
  inline_min_severity: major  # inline tier severity gate (major | critical)
  max_inline_comments: 10     # hard cap on inline comments per run (1-30)
  include_file_content: true  # attach full changed-file contents when small
  max_file_content_kb: 64     # per-file cap for content attachment
  concurrency: 3              # parallel provider calls (1-8)
  review_drafts: false        # draft PRs are skipped unless true
  # NOTE: there is no `post` key. Posting is enabled ONLY by the --post flag,
  # never by config, so a committed .sieve.yml can never turn writes on.

provider:
  type: anthropic            # anthropic | openai-compat | fake
  model: ""                  # required for anthropic/openai-compat, e.g. claude-sonnet-5
  base_url: ""               # required iff type == openai-compat
  api_key_env: ANTHROPIC_API_KEY  # NAME of the env var holding the key
  max_tokens: 4096           # 256-32768
  temperature: 0.1           # 0-1
  timeout_seconds: 120       # 10-600, per provider request
